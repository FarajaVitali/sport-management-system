<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %}Dashboard{% endblock %}</title>
</head>

<body class="bg-light">

    <div class="container-fluid vh-100 d-flex flex-column">

        <!-- Navbar -->
        {% include "partials/navbar.html" %}

        <!-- Main -->
        <div class="d-flex flex-grow-1">

            <!-- Sidebar -->
            {% include "partials/sidebar.html" %}

            <!-- Page Content -->
            <div class="border bg-light p-4" style="flex: 0 0 80%;">

                <h4 class="mb-4">Upcoming Fixtures</h4>

                <div class="row g-4">

                    <!-- Fixture Card -->
                    <div class="col-md-6">
                        <div class="card shadow-sm border-0 h-100">

                            <div class="card-body">

                                <!-- Teams -->
                                <div class="d-flex justify-content-between align-items-center mb-3">
                                    <h5 class="mb-0 fw-bold">ATC</h5>
                                    <span class="text-muted">VS</span>
                                    <h5 class="mb-0 fw-bold">IAA</h5>
                                </div>

                                <!-- Divider -->
                                <hr>

                                <!-- Match Details -->
                                <div class="d-flex justify-content-between text-muted small">
                                    <span><i class="bi bi-calendar"></i> 12 May</span>
                                    <span><i class="bi bi-clock"></i> 10:00 AM</span>
                                    <span><i class="bi bi-geo-alt"></i> Main Stadium</span>
                                </div>

                            </div>

                            <!-- Footer -->
                            <div class="card-footer bg-transparent border-0 text-end">
                                <button class="btn btn-sm btn-outline-primary">View Details</button>
                            </div>

                        </div>
                    </div>


                </div>
            </div>

        </div>

    </div>

    </div>
    </div>

</body>

</html>
