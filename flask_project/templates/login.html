<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../icons-1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>LOGIN PAGE</title>
</head>

<body>
    <div class="container d-flex vh-100 justify-content-center align-items-center">
        <div class="col-md-6 row-mt-3">
            <form class="border p-4" action="/login" method="post">
                <h3 class="text-center fw-bold">LOGIN HERE</h3>
                <div class="email">
                    <label for="email" class="form-label">Email:</label>
                    <input type="email" id="email" class="form-control" name="email" required>
                </div>
                <div class="password mt-3">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" class="form-control" name="passwd">
                </div>
                <p class="mt-3">Forgot Password? <a href="#">click here to reset</a></p>
                <input type="submit" class="mt-3 btn btn-primary form-control" value="Login" required>
                <p class="text-center">New Here? <a href="#">Click Here To Register</a></p>
            </form>
        </div>

    </div>
    </div>


</body>

</html>
