<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../icons-1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>RESET PAGE</title>
</head>

<body>
    <div class="container d-flex vh-100 justify-content-center align-items-center">
        <div class="col-md-6 row-mt-3">
            <form class="border p-4" action="/reset-password" method="post">
                <h3 class="text-center fw-bold">RESET PASSWORD HERE</h3>
                <div class="password">
                    <label for="password" class="form-label">Password:</label>
                    <input type="password" id="email" class="form-control" name="email" required>
                </div>
                <div class="confirm-password mt-3">
                    <label for="confirm-password" class="form-label">Confirm Password:</label>
                    <input type="password" class="form-control" name="c_passwd">
                </div>
                <input type="submit" class="mt-3 btn btn-primary form-control" value="Update Password" required>
            </form>
        </div>

    </div>
    </div>
</body>

</html>
