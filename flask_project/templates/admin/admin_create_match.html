<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>{% block title %}Dashboard{% endblock %}</title>
</head>

<body class="bg-light">

    <div class="container-fluid vh-100 d-flex flex-column">

        <!-- Navbar -->
        {% include "partials/navbar.html" %}

        <!-- Main -->
        <div class="d-flex flex-grow-1">

            <!-- Sidebar -->
            {% include "partials/sidebar.html" %}

            <!-- Page Content -->
            <div class="border bg-white p-3" style="flex: 0 0 80%;">
                <div class="card">
                    <div class="card-header">
                        Create Match
                    </div>
                    <div class="card-body">
                        <form action="/admin/create-match" method="POST" class="card p-4 shadow-sm">

                            <h4 class="mb-4">Create Match</h4>

                            <div class="row g-3">

                                <!-- Sport -->
                                <div class="col-md-6">
                                    <label class="form-label">Sport</label>
                                    <select class="form-select" name="sport_id">
                                        <option>Basketball</option>
                                        <option>Football</option>
                                    </select>
                                </div>

                                <!-- Team A -->
                                <div class="col-md-6">
                                    <label class="form-label">Team A</label>
                                    <select class="form-select" name="team_a">
                                        <option>ATC</option>
                                    </select>
                                </div>

                                <!-- Team B -->
                                <div class="col-md-6">
                                    <label class="form-label">Team B</label>
                                    <select class="form-select" name="team_b">
                                        <option>IAA</option>
                                    </select>
                                </div>

                                <!-- Date -->
                                <div class="col-md-6">
                                    <label class="form-label">Date</label>
                                    <input type="date" class="form-control" name="date">
                                </div>

                                <!-- Time -->
                                <div class="col-md-6">
                                    <label class="form-label">Time</label>
                                    <input type="time" class="form-control" name="time">
                                </div>

                                <!-- Venue -->
                                <div class="col-md-6">
                                    <label class="form-label">Venue</label>
                                    <input type="text" class="form-control" name="venue">
                                </div>

                            </div>

                            <!-- Buttons -->
                            <div class="mt-4 d-flex gap-2">
                                <button class="btn btn-primary">Create</button>
                                <a href="/admin" class="btn btn-secondary">Cancel</a>
                            </div>

                        </form>
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
