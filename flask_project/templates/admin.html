<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Admin Dashboard</title>
</head>

<body class="bg-light">

    <div class="container-fluid vh-100 d-flex flex-column">

        <!-- Top bar -->
        <div class="border p-3 bg-white" style="border: 1px solid #444;">
            <form action="/admin" class="d-flex" role="search">
                <input type="text" class="form-control w-50" placeholder="Search users...">
                <button class="btn btn-primary ms-3">Search</button>
            </form>
        </div>

        <!-- Main content -->
        <div class="d-flex flex-grow-1">

            <!-- Sidebar -->
            <div class="border bg-white p-3" style="flex: 0 0 20%;border: 1px solid #444;">
                <h5 class="mb-4">Admin Panel</h5>
                <div class="list-group">
                    <a href="#" class="list-group-item list-group-item-action active">Dashboard</a>
                    <a href="#" class="list-group-item list-group-item-action">Users</a>
                    <a href="#" class="list-group-item list-group-item-action">Pending</a>
                    <a href="#" class="list-group-item list-group-item-action">Approved</a>
                    <a href="#" class="list-group-item list-group-item-action">Banned</a>
                </div>
            </div>

            <!-- Main table area -->
            <div class="border bg-white p-3" style="flex: 0 0 80%;border: 1px solid #444;">
                <h4 class="mb-3">Users</h4>

                <div class="table-responsive">
                    <table class="table table-striped table-hover align-middle">
                        <thead class="table-light" style="background:#f1f1f1;">
                            <tr>
                                <th>#</th>
                                <th>First Name</th>
                                <th>Last Name</th>
                                <th>Email</th>
                                <th>College</th>
                                <th>Sport</th>
                                <th>Position</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for user in users%}
                            <tr>
                                <td>{{user.id}}</td>
                                <td>{{user.first_name}}</td>
                                <td>{{user.last_name}}</td>
                                <td>{{user.email}}</td>
                                <td>{{user.college}}</td>
                                <td>{{user.sport}}</td>
                                <td>{{user.position}}</td>
                                <td><span class="badge bg-warning text-dark">{{user.status}}</span></td>
                                <td>
                                    <button class="btn btn-success btn-sm">Allow</button>
                                    <button class="btn btn-danger btn-sm">Ban</button>
                                </td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

</body>

</html>
