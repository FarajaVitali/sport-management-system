<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../icons-1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <title>PLAYER</title>
</head>

<body>
    <div class="container d-flex vh-100 justify-content-center align-items-center">
        <div class="col-md-6 row-mt-3">
            <form class="border p-4" action="/login" method="post">
                <h3 class="text-center fw-bold">ADD MORE INFORMATION</h3>
                <div class="teams">
                    <label for="form-label">Choose Your Team:</label>
                    <select class="form-control" name="team" required>
                        <option>Choose Team</option>
                        <option value="ATC-Football">ATC-Football</option>
                        <option value="ATC-Basket">ATC-Basketball</option>
                        <option value="ATC-Volleyball">ATC-Volleyball</option>
                    </select>
                </div>
                <div class="jersey-number mt-3">
                    <label for="jersey-number" class="form-label">Jersey Number:</label>
                    <input type="number" class="form-control" name="jersey_number" required>
                </div>
                <div class="position">
                    <label for="position" class="form-label">Position You Play:</label>
                    <input type="text" class="form-control" name="position">
                </div>
                <input type="submit" class="mt-3 btn btn-primary form-control" value="Submit" required>
            </form>
        </div>

    </div>
    </div>


</body>

</html>
